# Local development: MySQL 8 + Redis (matches apps/api/.env.example)
# Usage: docker compose up -d
# Then from repo root: cd apps/api && npx prisma migrate dev --name 0_init && npm run db:seed -w api

services:
  mysql:
    image: mysql:8
    container_name: pouchcare-mysql
    restart: unless-stopped
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_DATABASE: pouchcare
      MYSQL_USER: pouchcare
      MYSQL_PASSWORD: pouchcare
      MYSQL_ROOT_PASSWORD: pouchcare
    ports:
      - "3306:3306"
    volumes:
      - pouchcare_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pouchcare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pouchcare_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pouchcare_mysql_data:
  pouchcare_redis_data:
