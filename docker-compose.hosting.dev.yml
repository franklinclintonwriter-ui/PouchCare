# Development API stack — isolated DB, Redis, and API for https://api-dev.pouchcare.com
#
# Does NOT share volumes or ports with docker-compose.hosting.yml (production).
# The prod Caddy container reverse-proxies api-dev.pouchcare.com → host:7001 (see deploy/Caddyfile).
#
# 1. Copy apps/api/.env.dev.example → apps/api/.env.dev (JWT_* must differ from production).
# 2. Optional: set MYSQL_PASSWORD_DEV in root .env (default: pouchcare_dev).
# 3. From repo root: npm run docker:hosting:dev  (Compose project name: pouchcare-dev — isolated from production)
#
# Health: http://localhost:7001/health  |  Public: https://api-dev.pouchcare.com/health
# (Requires prod stack Caddy running on the same host, or use tunnel only to host.docker.internal:7001.)

services:
  mysql_dev:
    image: mysql:8
    container_name: pouchcare-dev-mysql
    restart: unless-stopped
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_DATABASE: pouchcare_dev
      MYSQL_USER: pouchcare
      MYSQL_PASSWORD: ${MYSQL_PASSWORD_DEV:-pouchcare_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD_DEV:-pouchcare_dev}
    ports:
      - "${MYSQL_DEV_PORT:-3307}:3306"
    volumes:
      - pouchcare_dev_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis_dev:
    image: redis:7-alpine
    container_name: pouchcare-dev-redis
    restart: unless-stopped
    ports:
      - "${REDIS_DEV_PORT:-6380}:6379"
    volumes:
      - pouchcare_dev_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api_dev:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: pouchcare-dev-api
    restart: unless-stopped
    depends_on:
      mysql_dev:
        condition: service_healthy
      redis_dev:
        condition: service_healthy
    ports:
      - "${API_DEV_PORT:-7001}:7000"
    environment:
      # Must not be "production" here: assertProductionStorageOrExit() requires R2; dev stack uses local disk uploads.
      NODE_ENV: development
      PORT: "7000"
      STORAGE_LOCAL_FALLBACK: "true"
      DATABASE_URL: mysql://pouchcare:${MYSQL_PASSWORD_DEV:-pouchcare_dev}@mysql_dev:3306/pouchcare_dev
      REDIS_URL: redis://redis_dev:6379
      API_URL: ${API_URL_DEV:-https://api-dev.pouchcare.com}
    # Copy apps/api/.env.dev.example → apps/api/.env.dev before first `up` (JWT_*, CORS, etc.).
    env_file:
      - path: ./apps/api/.env.dev
        required: false
    volumes:
      - pouchcare_dev_api_uploads:/app/apps/api/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  pouchcare_dev_mysql_data:
  pouchcare_dev_redis_data:
  pouchcare_dev_api_uploads:
