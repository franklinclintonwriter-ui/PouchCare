# PouchCare OS — GitLab CI/CD
# Monorepo: npm workspaces + Turbo. Requires Node >= 20.
# https://gitlab.com/Pouchcare/OS
#
# ── Required CI/CD variables (GitLab → Settings → CI/CD → Variables) ────
#   SSH_PRIVATE_KEY  : ed25519 private key (type: File, masked)
#   DEPLOY_HOST      : 72.60.204.92
#   DEPLOY_USER      : pouchcare
#   DEPLOY_PORT      : 22  (optional, defaults to 22)
# ────────────────────────────────────────────────────────────────────────

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  NODE_VERSION: "20"
  DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci?schema=public"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"

default:
  image: node:${NODE_VERSION}-bookworm
  interruptible: true
  retry: 1
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - apps/api/node_modules/
      - .npm/

stages:
  - verify
  - build
  - deploy

# ── Quality gate: type-check + lint ─────────────────────────────────────
pouchcare:quality:
  stage: verify
  script:
    - set -euo pipefail
    - node --version && npm --version
    - npm ci --cache .npm --prefer-offline
    - echo "=== API — Prisma generate + tsc ==="
    - cd apps/api && npx prisma generate && npx tsc --noEmit
    - cd "$CI_PROJECT_DIR"
    - echo "=== Management — tsc ==="
    - cd apps/management && npx tsc --noEmit
    - cd "$CI_PROJECT_DIR"
    - echo "=== Landing — tsc ==="
    - cd apps/landing && npx tsc --noEmit

# ── Build all apps via Turbo ────────────────────────────────────────────
pouchcare:build:
  stage: build
  needs: ["pouchcare:quality"]
  script:
    - set -euo pipefail
    - npm ci --cache .npm --prefer-offline
    - cd apps/api && npx prisma generate && cd "$CI_PROJECT_DIR"
    - echo "=== Turbo build (API tsc + Vite apps) ==="
    - npm run build

# ── Auto-deploy to production on push to main ───────────────────────────
#
# Flow: SSH into server → git pull → npm install → prisma migrate →
#       rebuild frontends → pm2 restart → nginx reload
#
deploy:production:
  stage: deploy
  image: alpine:latest
  needs: ["pouchcare:build"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: never
  environment:
    name: production
    url: https://pouchcare.com
  before_script:
    - apk add --no-cache openssh-client bash curl
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -p ${DEPLOY_PORT:-22} -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "🚀 Deploying commit $CI_COMMIT_SHORT_SHA to $DEPLOY_HOST..."
    - |
      ssh -p ${DEPLOY_PORT:-22} -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST bash <<'REMOTE_SCRIPT'
        set -e
        echo "── Server: $(hostname) ──"
        cd /home/pouchcare/Developments/PouchCare
        sudo bash deploy/update.sh
      REMOTE_SCRIPT
    - echo "✅ Deploy complete — verifying health..."
    - sleep 5
    - |
      if curl -sf --max-time 10 "https://api.pouchcare.com/health" > /dev/null 2>&1; then
        echo "✅ API health check passed"
      else
        echo "⚠️  API health check failed (may need DNS/SSL setup)"
      fi
  after_script:
    - rm -f ~/.ssh/id_ed25519
