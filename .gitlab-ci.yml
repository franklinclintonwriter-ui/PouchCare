# PouchCare OS — GitLab CI/CD
# Monorepo: npm workspaces + Turbo. Requires Node >= 20.
# https://gitlab.com/Pouchcare/OS

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  NODE_VERSION: "20"
  # Prisma only needs this for `generate` / schema parse in CI (no DB connection).
  DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci?schema=public"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"

default:
  # Full Debian image — Prisma/OpenSSL fewer surprises than -slim on shared runners
  image: node:${NODE_VERSION}-bookworm
  interruptible: true
  retry: 1
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - apps/api/node_modules/
      - .npm/

stages:
  - verify
  - build
  - deploy

# ── Single verify job: one `npm ci` (cache-friendly), sequential checks ─────
pouchcare:quality:
  stage: verify
  script:
    - set -euo pipefail
    - node --version
    - npm --version
    - npm ci --cache .npm --prefer-offline
    - echo "=== API — Prisma generate + tsc ==="
    - cd apps/api && npx prisma generate && npx tsc --noEmit
    - cd "$CI_PROJECT_DIR"
    - echo "=== Management — ESLint ==="
    - npm run lint -w m.pouchcare.com
    - echo "=== Landing — ESLint ==="
    - npm run lint -w pouchcare.com

pouchcare:build:
  stage: build
  needs: ["pouchcare:quality"]
  script:
    - set -euo pipefail
    - npm ci --cache .npm --prefer-offline
    - echo "=== Turbo build (API tsc + Vite apps) ==="
    - npm run build

# SSH-based production deployment
# Required CI/CD variables (GitLab → Settings → CI/CD → Variables):
#   - SSH_PRIVATE_KEY: SSH private key (ed25519 format, no passphrase)
#   - DEPLOY_HOST: production server hostname or IP
#   - DEPLOY_USER: SSH user (typically 'root' or 'pouchcare')
# Optional:
#   - DEPLOY_PORT: SSH port (defaults to 22)
deploy:production:
  stage: deploy
  image: alpine:latest
  needs: ["pouchcare:build"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - when: never
  environment:
    name: production
    url: https://pouchcare.com
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "cd /home/pouchcare/Developments/PouchCare && bash deploy/update.sh"
  after_script:
    - rm -f ~/.ssh/id_ed25519
