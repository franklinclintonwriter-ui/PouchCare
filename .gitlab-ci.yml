# ──────────────────────────────────────────────────────────────────────────────
# PouchCare OS — GitLab CI/CD
# Monorepo: npm workspaces + Turbo  |  Node >= 20
#
# Architecture (current):
#   API      → Docker container on VPS (root@72.60.204.92)
#               Rebuilt & restarted via SSH on every push to main
#   Landing  → Cloudflare Pages project: pouchcare   (pouchcare.com)
#   Mgmt     → Cloudflare Pages project: pouchcarebd (m.pouchcare.com)
#
# ── Required GitLab CI/CD Variables (Settings → CI/CD → Variables) ──────────
#   CLOUDFLARE_API_TOKEN  API token with Pages:Write  (masked, protected)
#   DEPLOY_HOST           VPS IP: 72.60.204.92        (masked)
#   DEPLOY_USER           root                         (masked)
#   DEPLOY_PORT           22  (optional, defaults 22)
#   SSH_PRIVATE_KEY       ED25519 private key for VPS  (File type, protected)
# ──────────────────────────────────────────────────────────────────────────────

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"
  CLOUDFLARE_ACCOUNT_ID: "6433fd63b2b296d6e9d0d03b366c246e"

default:
  image: node:20-bookworm
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/

stages:
  - verify
  - build
  - deploy

# ── Type-check all workspaces ─────────────────────────────────────────────────
quality:typecheck:
  stage: verify
  script:
    - node --version && npm --version
    - npm ci --cache .npm --prefer-offline --legacy-peer-deps
    - echo "=== API: Prisma generate + tsc ==="
    - cd apps/api && npx prisma generate && npx tsc --noEmit && cd ../..
    - echo "=== Management: tsc ==="
    - cd apps/management && npx tsc --noEmit && cd ../..
    - echo "=== Landing: tsc ==="
    - cd apps/landing && npx tsc --noEmit && cd ../..
    - echo "✅ All type-checks passed"
  rules:
    - if: $CI_COMMIT_BRANCH

# ── Build all apps ────────────────────────────────────────────────────────────
build:all:
  stage: build
  needs: ["quality:typecheck"]
  script:
    - npm ci --cache .npm --prefer-offline --legacy-peer-deps
    - echo "=== Building API (TypeScript) ==="
    - cd apps/api && npx prisma generate && npx tsc && cd ../..
    - echo "=== Building Management SPA ==="
    - cd apps/management
    - echo "VITE_API_URL=https://api.pouchcare.com" >> .env.production.local
    - echo "VITE_WS_URL=wss://api.pouchcare.com/v1/realtime" >> .env.production.local
    - npm run build:vite
    - cd ../..
    - echo "=== Building Landing / Portal SPA ==="
    - cd apps/landing
    - echo "VITE_API_URL=https://api.pouchcare.com" >> .env.production.local
    - npm run build
    - cd ../..
    - echo "✅ All builds complete"
  artifacts:
    paths:
      - apps/api/dist/
      - apps/management/dist/
      - apps/landing/dist/
    expire_in: 2 hours

# ── Deploy Landing → pouchcare (pouchcare.com) ────────────────────────────────
deploy:landing:
  stage: deploy
  needs: ["build:all"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: never
  environment:
    name: production/landing
    url: https://pouchcare.com
  script:
    - npm ci --cache .npm --prefer-offline --legacy-peer-deps --silent
    - echo "Deploying Landing → Cloudflare Pages (pouchcare)..."
    - cd apps/landing
    - npx wrangler pages deploy dist --project-name pouchcare --branch main --commit-dirty=true
    - echo "✅ Landing deployed → https://pouchcare.com"

# ── Deploy Management → pouchcarebd (m.pouchcare.com) ────────────────────────
deploy:management:
  stage: deploy
  needs: ["build:all"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: never
  environment:
    name: production/management
    url: https://m.pouchcare.com
  script:
    - npm ci --cache .npm --prefer-offline --legacy-peer-deps --silent
    - echo "Deploying Management → Cloudflare Pages (pouchcarebd)..."
    - cd apps/management
    - npx wrangler pages deploy dist --project-name pouchcarebd --branch main --commit-dirty=true
    - echo "✅ Management deployed → https://m.pouchcare.com"

# ── Deploy API → Docker on VPS (root@72.60.204.92) ───────────────────────────
deploy:api:
  stage: deploy
  image: alpine:3.19
  needs: ["build:all"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: never
  environment:
    name: production/api
    url: https://api.pouchcare.com
  before_script:
    - apk add --no-cache openssh-client bash curl
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "Deploying API — commit ${CI_COMMIT_SHORT_SHA} to ${DEPLOY_HOST}..."
    - |
      ssh -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" bash << 'REMOTE'
        set -e
        REPO=/opt/pouchcare
        cd $REPO

        echo "── Pulling latest main ──"
        git fetch origin main
        git reset --hard origin/main
        echo "Commit: $(git log --oneline -1)"

        echo "── Running DB migrations ──"
        docker exec pouchcare-api sh -c "cd /app/apps/api && npx prisma migrate deploy" || true

        echo "── Rebuilding API container ──"
        docker compose -f docker-compose.hosting.yml up -d --build api

        echo "── Waiting for API to become healthy ──"
        for i in 1 2 3 4 5 6 7 8; do
          if curl -sf http://127.0.0.1:7000/health > /dev/null 2>&1; then
            echo "✅ API healthy"
            exit 0
          fi
          echo "   Waiting... ($i/8)"
          sleep 5
        done
        echo "❌ API health check failed"
        docker logs pouchcare-api --tail 20
        exit 1
      REMOTE
    - echo "✅ Verifying public endpoint..."
    - sleep 3
    - curl -sf --max-time 10 "https://api.pouchcare.com/health" && echo "✅ https://api.pouchcare.com/health OK" || echo "⚠️ External health check pending (DNS/TLS propagation)"
  after_script:
    - rm -f ~/.ssh/id_ed25519
