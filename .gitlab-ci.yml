# PouchCare OS — GitLab CI/CD
# Monorepo: npm workspaces + Turbo. Requires Node >= 20.
# https://gitlab.com/Pouchcare/OS
#
# Architecture:
#   API      → deployed to server via SSH (PM2 + Nginx reverse proxy)
#   Frontend → deployed to Cloudflare Pages (auto-deploy on push)
#
# ── Required CI/CD variables (GitLab → Settings → CI/CD → Variables) ────
#   SSH_PRIVATE_KEY  : ed25519 private key (type: Variable, masked)
#   DEPLOY_HOST      : server IP
#   DEPLOY_USER      : ubuntu
#   DEPLOY_PORT      : 22  (optional, defaults to 22)
# ────────────────────────────────────────────────────────────────────────

workflow:
  rules:
    # Avoid duplicate pipelines: skip branch pipeline if an MR exists
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"

default:
  image: node:20-bookworm
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - apps/api/node_modules/
      - apps/management/node_modules/
      - apps/landing/node_modules/
      - .npm/

stages:
  - verify
  - build
  - deploy

# ── Quality gate: type-check ────────────────────────────────────────────
pouchcare:quality:
  stage: verify
  script:
    - node --version && npm --version
    - npm ci --cache .npm --prefer-offline --legacy-peer-deps
    - echo "=== API — Prisma generate + tsc ==="
    - cd apps/api && npx prisma generate && npx tsc --noEmit && cd ../..
    - echo "=== Management — tsc ==="
    - cd apps/management && npx tsc --noEmit && cd ../..
    - echo "=== Landing — tsc ==="
    - cd apps/landing && npx tsc --noEmit && cd ../..
    - echo "✅ All type-checks passed"

# ── Build all apps via Turbo ────────────────────────────────────────────
pouchcare:build:
  stage: build
  needs: ["pouchcare:quality"]
  script:
    - npm ci --cache .npm --prefer-offline --legacy-peer-deps
    - cd apps/api && npx prisma generate && cd ../..
    - echo "=== Turbo build (API tsc + Vite apps) ==="
    - npx turbo run build
  artifacts:
    paths:
      - apps/api/dist/
      - apps/management/dist/
      - apps/landing/dist/
    expire_in: 1 hour

# ── Auto-deploy API to production on push to main ───────────────────────
#
# Frontends are deployed via Cloudflare Pages (auto-deploy on push).
# This job only updates the API: git pull → deps → prisma migrate → pm2 restart.
#
deploy:production:
  stage: deploy
  image: alpine:3.19
  needs: ["pouchcare:build"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: never
  environment:
    name: production
    url: https://api.pouchcare.com
  before_script:
    - apk add --no-cache openssh-client bash curl
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "Deploying API — commit $CI_COMMIT_SHORT_SHA to $DEPLOY_HOST..."
    - |
      ssh -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" bash <<'REMOTE_SCRIPT'
        set -e
        echo "── Server: $(hostname) ──"
        REPO=/home/ubuntu/Developments/PouchCare
        cd $REPO

        echo "── Pulling latest main ──"
        git remote set-url origin "https://aws:${GITLAB_DEPLOY_TOKEN}@gitlab.com/franklinclinton.writer/PouchCare.git" 2>/dev/null || true
        git fetch origin
        git checkout main
        git reset --hard origin/main
        echo "Commit: $(git log --oneline -1)"

        echo "── Installing deps ──"
        npm install --legacy-peer-deps --silent 2>&1 | tail -3

        echo "── Prisma generate + migrate ──"
        cd apps/api
        npx prisma generate
        npx prisma migrate deploy 2>&1 || npx prisma db push 2>&1
        echo "DB synced"

        echo "── Restarting API ──"
        fuser -k 7000/tcp 2>/dev/null || true
        sleep 1
        pm2 delete pouchcare-api 2>/dev/null || true
        pm2 start /home/ubuntu/Developments/PouchCare/ecosystem.config.js --update-env
        sleep 5

        echo "── Health check ──"
        for i in 1 2 3 4 5 6; do
          if curl -sf http://localhost:7000/health > /dev/null 2>&1; then
            echo "✅ API is healthy"
            pm2 save
            exit 0
          fi
          echo "   Waiting... (attempt $i/6)"
          sleep 3
        done
        echo "❌ API health check failed"
        pm2 logs pouchcare-api --lines 15 --nostream 2>/dev/null || true
        exit 1
      REMOTE_SCRIPT
    - echo "✅ API deploy complete — verifying external health..."
    - sleep 3
    - |
      if curl -sf --max-time 10 "https://api.pouchcare.com/health" > /dev/null 2>&1; then
        echo "✅ API health check passed"
      else
        echo "⚠️  API health check failed (may need DNS/SSL setup)"
      fi
  after_script:
    - rm -f ~/.ssh/id_ed25519
