<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5f3ff"/><stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity=".12"/></filter>
    <filter id="shs"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity=".1"/></filter>
  </defs>
  <rect width="560" height="340" rx="16" fill="url(#bg)"/>

  <!-- Domain search bar -->
  <g filter="url(#sh)" transform="translate(30, 20)">
    <rect width="500" height="52" rx="16" fill="white"/>
    <rect x="6" y="6" width="40" height="40" rx="12" fill="#f5f3ff"/>
    <text x="18" y="32" font-family="system-ui" font-size="16" fill="#8b5cf6">🔍</text>
    <text x="56" y="32" font-family="system-ui" font-size="13" fill="#1e293b" font-weight="600">mybusiness</text>
    <text x="142" y="32" font-family="system-ui" font-size="13" fill="#8b5cf6" font-weight="700">.com</text>
    <rect x="400" y="8" width="90" height="36" rx="10" fill="url(#violet)"/>
    <text x="420" y="32" font-family="system-ui" font-size="11" fill="white" font-weight="700">Search</text>
  </g>

  <!-- TLD results row -->
  <g transform="translate(30, 82)">
    <!-- .com -->
    <g filter="url(#shs)">
      <rect width="115" height="70" rx="10" fill="white"/>
      <rect width="115" height="4" rx="2" fill="#10b981"/>
      <text x="12" y="26" font-family="monospace" font-size="12" fill="#1e293b" font-weight="800">.com</text>
      <text x="12" y="42" font-family="system-ui" font-size="10" fill="#10b981" font-weight="700">Available</text>
      <text x="12" y="58" font-family="system-ui" font-size="11" fill="#7c3aed" font-weight="800">$12.99/yr</text>
    </g>
    <!-- .net -->
    <g filter="url(#shs)" transform="translate(125, 0)">
      <rect width="115" height="70" rx="10" fill="white"/>
      <rect width="115" height="4" rx="2" fill="#10b981"/>
      <text x="12" y="26" font-family="monospace" font-size="12" fill="#1e293b" font-weight="800">.net</text>
      <text x="12" y="42" font-family="system-ui" font-size="10" fill="#10b981" font-weight="700">Available</text>
      <text x="12" y="58" font-family="system-ui" font-size="11" fill="#7c3aed" font-weight="800">$11.99/yr</text>
    </g>
    <!-- .io -->
    <g filter="url(#shs)" transform="translate(250, 0)">
      <rect width="115" height="70" rx="10" fill="white"/>
      <rect width="115" height="4" rx="2" fill="#f59e0b"/>
      <text x="12" y="26" font-family="monospace" font-size="12" fill="#1e293b" font-weight="800">.io</text>
      <text x="12" y="42" font-family="system-ui" font-size="10" fill="#10b981" font-weight="700">Available</text>
      <text x="12" y="58" font-family="system-ui" font-size="11" fill="#7c3aed" font-weight="800">$34.99/yr</text>
    </g>
    <!-- .dev -->
    <g filter="url(#shs)" transform="translate(375, 0)">
      <rect width="125" height="70" rx="10" fill="white"/>
      <rect width="125" height="4" rx="2" fill="#ef4444"/>
      <text x="12" y="26" font-family="monospace" font-size="12" fill="#1e293b" font-weight="800">.dev</text>
      <text x="12" y="42" font-family="system-ui" font-size="10" fill="#ef4444" font-weight="700">Taken</text>
      <text x="12" y="58" font-family="system-ui" font-size="11" fill="#94a3b8" font-weight="600" text-decoration="line-through">$14.99/yr</text>
    </g>
  </g>

  <!-- Hosting plans -->
  <g transform="translate(30, 168)">
    <!-- Shared -->
    <g filter="url(#sh)">
      <rect width="155" height="155" rx="12" fill="white"/>
      <rect x="12" y="12" width="40" height="18" rx="6" fill="#f5f3ff"/>
      <text x="20" y="25" font-family="system-ui" font-size="8" fill="#7c3aed" font-weight="700">Shared</text>
      <text x="12" y="54" font-family="system-ui" font-size="24" fill="#1e293b" font-weight="800">$6.50</text>
      <text x="88" y="54" font-family="system-ui" font-size="9" fill="#94a3b8">/mo</text>
      <line x1="12" y1="64" x2="143" y2="64" stroke="#f1f5f9" stroke-width="1"/>
      <text x="12" y="80" font-family="system-ui" font-size="8" fill="#10b981">✓</text>
      <text x="24" y="80" font-family="system-ui" font-size="8" fill="#475569">10 GB SSD Storage</text>
      <text x="12" y="96" font-family="system-ui" font-size="8" fill="#10b981">✓</text>
      <text x="24" y="96" font-family="system-ui" font-size="8" fill="#475569">Free SSL Certificate</text>
      <text x="12" y="112" font-family="system-ui" font-size="8" fill="#10b981">✓</text>
      <text x="24" y="112" font-family="system-ui" font-size="8" fill="#475569">Daily Backups</text>
      <text x="12" y="128" font-family="system-ui" font-size="8" fill="#10b981">✓</text>
      <text x="24" y="128" font-family="system-ui" font-size="8" fill="#475569">1-Click WordPress</text>
      <rect x="12" y="136" width="131" height="10" rx="3" fill="#f5f3ff"/>
      <text x="40" y="144" font-family="system-ui" font-size="6" fill="#7c3aed" font-weight="600">Best for Blogs</text>
    </g>
    <!-- VPS (featured) -->
    <g filter="url(#sh)" transform="translate(170, -8)">
      <rect width="175" height="163" rx="12" fill="url(#violet)"/>
      <rect x="50" y="-6" width="75" height="18" rx="9" fill="#fbbf24"/>
      <text x="62" y="7" font-family="system-ui" font-size="7" fill="#1e293b" font-weight="800">MOST POPULAR</text>
      <text x="14" y="30" font-family="system-ui" font-size="9" fill="#e9d5ff" font-weight="700">VPS Hosting</text>
      <text x="14" y="60" font-family="system-ui" font-size="26" fill="white" font-weight="800">$24</text>
      <text x="68" y="60" font-family="system-ui" font-size="9" fill="#c4b5fd">/mo</text>
      <line x1="14" y1="70" x2="161" y2="70" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
      <text x="14" y="88" font-family="system-ui" font-size="8" fill="#d1fae5">✓</text>
      <text x="26" y="88" font-family="system-ui" font-size="8" fill="#e9d5ff">100 GB NVMe SSD</text>
      <text x="14" y="104" font-family="system-ui" font-size="8" fill="#d1fae5">✓</text>
      <text x="26" y="104" font-family="system-ui" font-size="8" fill="#e9d5ff">4 GB RAM · 2 vCPU</text>
      <text x="14" y="120" font-family="system-ui" font-size="8" fill="#d1fae5">✓</text>
      <text x="26" y="120" font-family="system-ui" font-size="8" fill="#e9d5ff">Free CDN &amp; DDoS</text>
      <text x="14" y="136" font-family="system-ui" font-size="8" fill="#d1fae5">✓</text>
      <text x="26" y="136" font-family="system-ui" font-size="8" fill="#e9d5ff">Staging Environment</text>
      <rect x="14" y="146" width="147" height="10" rx="3" fill="rgba(255,255,255,.12)"/>
      <text x="40" y="154" font-family="system-ui" font-size="6" fill="white" font-weight="600">Best for Business</text>
    </g>
    <!-- Dedicated -->
    <g filter="url(#sh)" transform="translate(360, 0)">
      <rect width="170" height="155" rx="12" fill="white"/>
      <rect x="12" y="12" width="58" height="18" rx="6" fill="#f5f3ff"/>
      <text x="18" y="25" font-family="system-ui" font-size="8" fill="#7c3aed" font-weight="700">Dedicated</text>
      <text x="12" y="54" font-family="system-ui" font-size="24" fill="#1e293b" font-weight="800">$89</text>
      <text x="62" y="54" font-family="system-ui" font-size="9" fill="#94a3b8">/mo</text>
      <line x1="12" y1="64" x2="158" y2="64" stroke="#f1f5f9" stroke-width="1"/>
      <text x="12" y="80" font-family="system-ui" font-size="8" fill="#10b981">✓</text>
      <text x="24" y="80" font-family="system-ui" font-size="8" fill="#475569">1 TB NVMe SSD</text>
      <text x="12" y="96" font-family="system-ui" font-size="8" fill="#10b981">✓</text>
      <text x="24" y="96" font-family="system-ui" font-size="8" fill="#475569">16 GB RAM · 8 vCPU</text>
      <text x="12" y="112" font-family="system-ui" font-size="8" fill="#10b981">✓</text>
      <text x="24" y="112" font-family="system-ui" font-size="8" fill="#475569">Root SSH Access</text>
      <text x="12" y="128" font-family="system-ui" font-size="8" fill="#10b981">✓</text>
      <text x="24" y="128" font-family="system-ui" font-size="8" fill="#475569">99.99% Uptime SLA</text>
      <rect x="12" y="136" width="146" height="10" rx="3" fill="#f5f3ff"/>
      <text x="32" y="144" font-family="system-ui" font-size="6" fill="#7c3aed" font-weight="600">Best for Enterprise</text>
    </g>
  </g>
</svg>
