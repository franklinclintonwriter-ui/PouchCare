        <text x="6" y="12" font-family="monospace" font-size="6" fill="#38bdf8" font-weight="600">guest posting</text>
        <rect x="82" y="4" width="22" height="10" rx="3" fill="#10b981" opacity=".15"/>
        <text x="86" y="12" font-family="system-ui" font-size="5" fill="#10b981" font-weight="700">#1</text>
      </g>
