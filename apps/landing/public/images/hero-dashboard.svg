<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#10b981"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity=".18"/></filter>
    <filter id="shs"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity=".12"/></filter>
  </defs>
  <rect width="560" height="400" rx="16" fill="url(#bg)"/>
  <!-- Browser chrome -->
  <rect x="20" y="20" width="520" height="360" rx="12" fill="#1a2332" stroke="#334155" stroke-width="1"/>
  <rect x="20" y="20" width="520" height="32" rx="12" fill="#0f172a"/>
  <rect x="20" y="40" width="520" height="12" fill="#0f172a"/>
  <circle cx="38" cy="36" r="5" fill="#ef4444" opacity=".8"/>
