    <rect x="20" y="190" width="240" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="20" y="198" width="180" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="20" y="206" width="220" height="4" rx="2" fill="#e2e8f0"/>
