<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/><stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity=".1"/></filter>
  </defs>
  <rect width="480" height="220" rx="14" fill="url(#bg)"/>

  <!-- Step 1: Research -->
  <g filter="url(#sh)" transform="translate(15, 30)">
    <rect width="100" height="160" rx="10" fill="white"/>
    <rect width="100" height="4" rx="2" fill="#3b82f6"/>
    <rect x="34" y="16" width="32" height="32" rx="10" fill="#eff6ff"/>
    <text x="50" y="38" font-family="system-ui" font-size="16" text-anchor="middle">🔍</text>
    <text x="50" y="64" font-family="system-ui" font-size="7" fill="#1e293b" font-weight="700" text-anchor="middle">1. Research</text>
    <text x="50" y="78" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">Analyse your niche,</text>
    <text x="50" y="88" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">competitors &amp; gaps</text>
    <!-- Mini checklist -->
    <g transform="translate(14, 100)">
      <text x="0" y="8" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="8" font-family="system-ui" font-size="5" fill="#475569">Competitor audit</text>
      <text x="0" y="20" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="20" font-family="system-ui" font-size="5" fill="#475569">Keyword mapping</text>
      <text x="0" y="32" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="32" font-family="system-ui" font-size="5" fill="#475569">Link gap analysis</text>
      <text x="0" y="44" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="44" font-family="system-ui" font-size="5" fill="#475569">Strategy doc</text>
    </g>
  </g>
  <!-- Arrow 1→2 -->
  <path d="M120 110 L130 110" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arr)"/>
  <text x="125" y="106" font-family="system-ui" font-size="10" fill="#cbd5e1">→</text>

  <!-- Step 2: Outreach -->
  <g filter="url(#sh)" transform="translate(135, 30)">
    <rect width="100" height="160" rx="10" fill="white"/>
    <rect width="100" height="4" rx="2" fill="#8b5cf6"/>
    <rect x="34" y="16" width="32" height="32" rx="10" fill="#f5f3ff"/>
    <text x="50" y="38" font-family="system-ui" font-size="16" text-anchor="middle">📧</text>
    <text x="50" y="64" font-family="system-ui" font-size="7" fill="#1e293b" font-weight="700" text-anchor="middle">2. Outreach</text>
    <text x="50" y="78" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">Contact publishers,</text>
    <text x="50" y="88" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">negotiate placements</text>
    <g transform="translate(14, 100)">
      <text x="0" y="8" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="8" font-family="system-ui" font-size="5" fill="#475569">Manual outreach</text>
      <text x="0" y="20" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="20" font-family="system-ui" font-size="5" fill="#475569">Site vetting (14-pt)</text>
      <text x="0" y="32" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="32" font-family="system-ui" font-size="5" fill="#475569">Niche matching</text>
      <text x="0" y="44" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="44" font-family="system-ui" font-size="5" fill="#475569">Price negotiation</text>
    </g>
  </g>
  <text x="245" y="106" font-family="system-ui" font-size="10" fill="#cbd5e1">→</text>

  <!-- Step 3: Publish -->
  <g filter="url(#sh)" transform="translate(255, 30)">
    <rect width="100" height="160" rx="10" fill="white"/>
    <rect width="100" height="4" rx="2" fill="#10b981"/>
    <rect x="34" y="16" width="32" height="32" rx="10" fill="#ecfdf5"/>
    <text x="50" y="38" font-family="system-ui" font-size="16" text-anchor="middle">✍️</text>
    <text x="50" y="64" font-family="system-ui" font-size="7" fill="#1e293b" font-weight="700" text-anchor="middle">3. Publish</text>
    <text x="50" y="78" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">Write content,</text>
    <text x="50" y="88" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">place contextual links</text>
    <g transform="translate(14, 100)">
      <text x="0" y="8" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="8" font-family="system-ui" font-size="5" fill="#475569">Expert writers</text>
      <text x="0" y="20" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="20" font-family="system-ui" font-size="5" fill="#475569">Contextual anchor</text>
      <text x="0" y="32" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="32" font-family="system-ui" font-size="5" fill="#475569">Permanent do-follow</text>
      <text x="0" y="44" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="44" font-family="system-ui" font-size="5" fill="#475569">5-7 day delivery</text>
    </g>
  </g>
  <text x="365" y="106" font-family="system-ui" font-size="10" fill="#cbd5e1">→</text>

  <!-- Step 4: Report -->
  <g filter="url(#sh)" transform="translate(375, 30)">
    <rect width="90" height="160" rx="10" fill="white"/>
    <rect width="90" height="4" rx="2" fill="#f59e0b"/>
    <rect x="29" y="16" width="32" height="32" rx="10" fill="#fffbeb"/>
    <text x="45" y="38" font-family="system-ui" font-size="16" text-anchor="middle">📊</text>
    <text x="45" y="64" font-family="system-ui" font-size="7" fill="#1e293b" font-weight="700" text-anchor="middle">4. Report</text>
    <text x="45" y="78" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">Track indexing,</text>
    <text x="45" y="88" font-family="system-ui" font-size="5.5" fill="#64748b" text-anchor="middle">measure impact</text>
    <g transform="translate(10, 100)">
      <text x="0" y="8" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="8" font-family="system-ui" font-size="5" fill="#475569">Live URL report</text>
      <text x="0" y="20" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="20" font-family="system-ui" font-size="5" fill="#475569">Index monitoring</text>
      <text x="0" y="32" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="32" font-family="system-ui" font-size="5" fill="#475569">DA/traffic stats</text>
      <text x="0" y="44" font-family="system-ui" font-size="5" fill="#10b981">✓</text><text x="10" y="44" font-family="system-ui" font-size="5" fill="#475569">Free replacements</text>
    </g>
  </g>
</svg>
