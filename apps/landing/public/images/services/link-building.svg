<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0f2fe"/><stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0ea5e9"/><stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
    <filter id="gl"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Glow blobs -->
  <circle cx="120" cy="120" r="60" fill="#0ea5e9" opacity=".08" filter="url(#gl)"/>
  <circle cx="280" cy="180" r="60" fill="#2563eb" opacity=".08" filter="url(#gl)"/>
  <!-- Connection lines -->
  <path d="M130 130 Q200 80 270 140" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="8 4" opacity=".4"/>
  <path d="M130 130 Q180 200 270 140" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 4" opacity=".3"/>
  <path d="M130 130 L200 230" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6 4" opacity=".25"/>
  <path d="M270 140 L320 230" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 4" opacity=".25"/>
  <!-- Website node 1 (left) -->
  <g filter="url(#sh)">
    <circle cx="130" cy="130" r="44" fill="white"/>
    <circle cx="130" cy="130" r="38" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
    <rect x="110" y="112" width="40" height="28" rx="4" fill="white" stroke="#93c5fd" stroke-width="1"/>
    <rect x="110" y="112" width="40" height="8" rx="4" fill="#0ea5e9" opacity=".2"/>
    <circle cx="116" cy="116" r="2" fill="#fca5a5"/>
    <circle cx="122" cy="116" r="2" fill="#86efac"/>
    <rect x="114" y="124" width="20" height="3" rx="1" fill="#cbd5e1"/>
    <rect x="114" y="130" width="14" height="3" rx="1" fill="#cbd5e1"/>
    <text x="130" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0ea5e9" font-weight="700">DA 45</text>
  </g>
  <!-- Website node 2 (right) -->
  <g filter="url(#sh)">
    <circle cx="270" cy="140" r="44" fill="white"/>
    <circle cx="270" cy="140" r="38" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <rect x="250" y="122" width="40" height="28" rx="4" fill="white" stroke="#93c5fd" stroke-width="1"/>
    <rect x="250" y="122" width="40" height="8" rx="4" fill="#2563eb" opacity=".2"/>
    <circle cx="256" cy="126" r="2" fill="#fca5a5"/>
    <circle cx="262" cy="126" r="2" fill="#86efac"/>
    <rect x="254" y="134" width="22" height="3" rx="1" fill="#cbd5e1"/>
    <rect x="254" y="140" width="16" height="3" rx="1" fill="#cbd5e1"/>
    <text x="270" y="170" text-anchor="middle" font-family="system-ui" font-size="8" fill="#2563eb" font-weight="700">DA 60</text>
  </g>
  <!-- Chain link icon center -->
  <g filter="url(#sh)" transform="translate(175, 95)">
    <circle cx="25" cy="25" r="25" fill="url(#link)"/>
    <path d="M18 22a6 6 0 0 1 6-6h2a4 4 0 0 1 0 8h-2a2 2 0 0 0 0 4h4a4 4 0 0 1 0 8h-4a6 6 0 0 1-6-6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Small nodes -->
  <g filter="url(#sh)">
    <circle cx="200" cy="230" r="22" fill="white"/>
    <circle cx="200" cy="230" r="16" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="200" y="234" text-anchor="middle" font-family="system-ui" font-size="7" fill="#2563eb" font-weight="600">DA 35</text>
  </g>
  <g filter="url(#sh)">
    <circle cx="320" cy="230" r="22" fill="white"/>
    <circle cx="320" cy="230" r="16" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="320" y="234" text-anchor="middle" font-family="system-ui" font-size="7" fill="#2563eb" font-weight="600">DA 50</text>
  </g>
  <!-- Rising arrow -->
  <g filter="url(#sh)" transform="translate(30, 30)">
    <rect width="80" height="44" rx="10" fill="white"/>
    <text x="12" y="18" font-family="system-ui" font-size="8" fill="#64748b" font-weight="500">Authority</text>
    <path d="M14 36 L30 28 L46 32 L62 22" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="62" cy="22" r="3" fill="#10b981"/>
    <text x="50" y="40" font-family="system-ui" font-size="7" fill="#10b981" font-weight="700">+247%</text>
  </g>
</svg>
