<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ecfdf5"/><stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Figma workspace -->
  <g filter="url(#sh)">
    <rect x="20" y="20" width="280" height="260" rx="10" fill="white"/>
    <!-- Top bar -->
    <rect x="20" y="20" width="280" height="28" rx="10" fill="#1e1e1e"/>
    <rect x="20" y="40" width="280" height="8" fill="#1e1e1e"/>
    <!-- Figma logo -->
    <circle cx="38" cy="34" r="5" fill="#f24e1e"/>
    <circle cx="38" cy="34" r="3" fill="#ff7262"/>
    <text x="52" y="38" font-family="system-ui" font-size="8" fill="#a3a3a3">Untitled — Figma</text>
    <!-- Left panel - layers -->
    <rect x="20" y="48" width="56" height="232" fill="#2c2c2c"/>
    <text x="28" y="64" font-family="system-ui" font-size="7" fill="#a3a3a3" font-weight="500">Layers</text>
    <rect x="26" y="72" width="44" height="6" rx="2" fill="#404040"/>
    <rect x="30" y="82" width="40" height="6" rx="2" fill="#525252"/>
    <rect x="30" y="92" width="36" height="6" rx="2" fill="#525252"/>
    <rect x="30" y="102" width="40" height="6" rx="2" fill="#a78bfa" opacity=".4"/>
    <rect x="30" y="112" width="38" height="6" rx="2" fill="#525252"/>
    <!-- Canvas area -->
    <rect x="76" y="48" width="164" height="232" fill="#f5f5f5"/>
    <!-- Wireframe cards on canvas -->
    <rect x="90" y="62" width="136" height="24" rx="6" fill="#10b981" opacity=".15" stroke="#10b981" stroke-width="1.5"/>
    <text x="130" y="78" font-family="system-ui" font-size="9" fill="#10b981" font-weight="700" text-anchor="middle">Navigation Bar</text>
    <rect x="90" y="96" width="66" height="60" rx="6" fill="white" stroke="#d4d4d8" stroke-width="1"/>
    <rect x="96" y="102" width="54" height="24" rx="4" fill="#e9d5ff" opacity=".5"/>
    <text x="104" y="118" font-family="system-ui" font-size="14">🖼️</text>
    <rect x="96" y="130" width="36" height="4" rx="2" fill="#a3a3a3"/>
    <rect x="96" y="138" width="28" height="4" rx="2" fill="#d4d4d8"/>
    <rect x="96" y="146" width="32" height="4" rx="2" fill="#d4d4d8"/>
    <rect x="164" y="96" width="62" height="60" rx="6" fill="white" stroke="#d4d4d8" stroke-width="1"/>
    <rect x="170" y="102" width="50" height="24" rx="4" fill="#bae6fd" opacity=".5"/>
    <text x="178" y="118" font-family="system-ui" font-size="14">📊</text>
    <rect x="170" y="130" width="30" height="4" rx="2" fill="#a3a3a3"/>
    <rect x="170" y="138" width="38" height="4" rx="2" fill="#d4d4d8"/>
    <rect x="170" y="146" width="25" height="4" rx="2" fill="#d4d4d8"/>
    <!-- CTA wireframe -->
    <rect x="90" y="166" width="136" height="38" rx="6" fill="white" stroke="#d4d4d8" stroke-width="1"/>
    <rect x="100" y="174" width="60" height="8" rx="3" fill="#1e293b" opacity=".2"/>
    <rect x="100" y="186" width="44" height="12" rx="5" fill="#10b981"/>
    <text x="106" y="196" font-family="system-ui" font-size="7" fill="white" font-weight="600">Sign Up</text>
    <!-- Selection handles -->
    <rect x="87" y="163" width="142" height="44" rx="4" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 2"/>
    <circle cx="87" cy="163" r="3" fill="#3b82f6"/>
    <circle cx="229" cy="163" r="3" fill="#3b82f6"/>
    <circle cx="87" cy="207" r="3" fill="#3b82f6"/>
    <circle cx="229" cy="207" r="3" fill="#3b82f6"/>
    <!-- Footer wireframe -->
    <rect x="90" y="214" width="136" height="20" rx="4" fill="#374151" opacity=".08"/>
    <rect x="100" y="220" width="50" height="4" rx="2" fill="#a3a3a3"/>
    <rect x="160" y="220" width="30" height="4" rx="2" fill="#a3a3a3"/>
    <!-- Mobile preview frame -->
    <rect x="92" y="240" width="30" height="28" rx="4" fill="white" stroke="#d4d4d8" stroke-width="1"/>
    <rect x="96" y="246" width="22" height="4" rx="1" fill="#e2e8f0"/>
    <rect x="96" y="254" width="16" height="4" rx="1" fill="#e2e8f0"/>
    <rect x="96" y="262" width="10" height="4" rx="2" fill="#10b981" opacity=".5"/>
    <!-- Right panel - properties -->
    <rect x="240" y="48" width="60" height="232" fill="#fafafa" stroke-left="#e5e5e5"/>
    <rect x="240" y="48" width="1" height="232" fill="#e5e5e5"/>
  </g>
  <!-- Color palette -->
  <g filter="url(#sh)" transform="translate(310, 60)">
    <rect width="70" height="90" rx="8" fill="white"/>
    <text x="10" y="18" font-family="system-ui" font-size="7" fill="#64748b" font-weight="600">Colors</text>
    <circle cx="20" cy="34" r="8" fill="#10b981"/>
    <circle cx="40" cy="34" r="8" fill="#0ea5e9"/>
    <circle cx="60" cy="34" r="8" fill="#8b5cf6"/>
    <circle cx="20" cy="54" r="8" fill="#f43f5e"/>
    <circle cx="40" cy="54" r="8" fill="#f59e0b"/>
    <circle cx="60" cy="54" r="8" fill="#1e293b"/>
    <rect x="10" y="70" width="50" height="10" rx="4" fill="#10b981" opacity=".2"/>
    <text x="14" y="78" font-family="monospace" font-size="6" fill="#10b981">#10b981</text>
  </g>
  <!-- Typography card -->
  <g filter="url(#sh)" transform="translate(310, 165)">
    <rect width="70" height="60" rx="8" fill="white"/>
    <text x="10" y="18" font-family="system-ui" font-size="7" fill="#64748b" font-weight="600">Typography</text>
    <text x="10" y="34" font-family="system-ui" font-size="11" fill="#1e293b" font-weight="800">Aa</text>
    <text x="32" y="34" font-family="system-ui" font-size="7" fill="#64748b">Inter</text>
    <text x="10" y="50" font-family="system-ui" font-size="7" fill="#a3a3a3">Heading · 24px · Bold</text>
  </g>
  <!-- Responsive badge -->
  <g filter="url(#sh)" transform="translate(310, 240)">
    <rect width="70" height="36" rx="8" fill="white"/>
    <text x="10" y="16" font-family="system-ui" font-size="7" fill="#64748b" font-weight="500">Responsive</text>
    <text x="10" y="30" font-family="system-ui" font-size="10">🖥️ 📱 📟</text>
  </g>
</svg>
