<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffbeb"/><stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Article document -->
  <g filter="url(#sh)">
    <rect x="40" y="25" width="220" height="250" rx="10" fill="white"/>
    <!-- Title area -->
    <rect x="56" y="42" width="130" height="10" rx="3" fill="#f59e0b" opacity=".3"/>
    <text x="56" y="50" font-family="system-ui" font-size="9" fill="#92400e" font-weight="800">10 SEO Strategies That</text>
    <rect x="56" y="58" width="100" height="8" rx="3" fill="#f59e0b" opacity=".2"/>
    <text x="56" y="65" font-family="system-ui" font-size="8" fill="#92400e" font-weight="700">Actually Work in 2026</text>
    <!-- Author line -->
    <circle cx="64" cy="84" r="6" fill="#fbbf24" opacity=".3"/>
    <text x="64" y="87" text-anchor="middle" font-family="system-ui" font-size="6" fill="#92400e">✍</text>
    <text x="76" y="86" font-family="system-ui" font-size="7" fill="#78716c">By Sarah Kim · 8 min read</text>
    <!-- Paragraph lines -->
    <rect x="56" y="100" width="188" height="4" rx="2" fill="#d6d3d1"/>
    <rect x="56" y="110" width="170" height="4" rx="2" fill="#d6d3d1"/>
    <rect x="56" y="120" width="180" height="4" rx="2" fill="#d6d3d1"/>
    <rect x="56" y="130" width="150" height="4" rx="2" fill="#d6d3d1"/>
    <!-- Highlighted keyword -->
    <rect x="56" y="146" width="40" height="12" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
    <text x="62" y="155" font-family="system-ui" font-size="6" fill="#92400e" font-weight="600">keyword</text>
    <rect x="100" y="148" width="144" height="4" rx="2" fill="#d6d3d1"/>
    <rect x="56" y="164" width="188" height="4" rx="2" fill="#d6d3d1"/>
    <rect x="56" y="174" width="160" height="4" rx="2" fill="#d6d3d1"/>
    <!-- Subheading -->
    <rect x="56" y="192" width="120" height="8" rx="3" fill="#f59e0b" opacity=".15"/>
    <text x="56" y="199" font-family="system-ui" font-size="7" fill="#92400e" font-weight="700">Key Takeaways</text>
    <!-- Bullet points -->
    <circle cx="62" cy="214" r="2.5" fill="#f59e0b"/>
    <rect x="70" y="212" width="140" height="4" rx="2" fill="#d6d3d1"/>
    <circle cx="62" cy="226" r="2.5" fill="#f59e0b"/>
    <rect x="70" y="224" width="120" height="4" rx="2" fill="#d6d3d1"/>
    <circle cx="62" cy="238" r="2.5" fill="#f59e0b"/>
    <rect x="70" y="236" width="130" height="4" rx="2" fill="#d6d3d1"/>
    <!-- Word count -->
    <rect x="56" y="252" width="80" height="14" rx="5" fill="#fef3c7"/>
    <text x="62" y="262" font-family="system-ui" font-size="7" fill="#92400e" font-weight="600">2,450 words · SEO A+</text>
  </g>
  <!-- Pen illustration -->
  <g filter="url(#sh)" transform="translate(270, 30)">
    <rect width="100" height="80" rx="10" fill="white"/>
    <!-- Pen -->
    <g transform="translate(25, 10)">
      <rect x="20" y="0" width="10" height="50" rx="2" fill="#f59e0b" transform="rotate(15, 25, 25)"/>
      <polygon points="15,52 25,60 35,52" fill="#1e293b" transform="rotate(15, 25, 25)"/>
      <rect x="20" y="0" width="10" height="8" rx="2" fill="#fbbf24" transform="rotate(15, 25, 25)"/>
    </g>
    <text x="50" y="74" text-anchor="middle" font-family="system-ui" font-size="7" fill="#64748b" font-weight="500">Native writers</text>
  </g>
  <!-- SEO score -->
  <g filter="url(#sh)" transform="translate(275, 125)">
    <rect width="100" height="55" rx="8" fill="white"/>
    <text x="12" y="18" font-family="system-ui" font-size="7" fill="#64748b" font-weight="500">Readability</text>
    <rect x="12" y="26" width="76" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="12" y="26" width="60" height="6" rx="3" fill="#10b981"/>
    <text x="12" y="46" font-family="system-ui" font-size="9" fill="#10b981" font-weight="700">Grade 8 · Excellent</text>
  </g>
  <!-- Plagiarism check -->
  <g filter="url(#sh)" transform="translate(275, 196)">
    <rect width="100" height="45" rx="8" fill="white"/>
    <text x="12" y="18" font-family="system-ui" font-size="7" fill="#64748b" font-weight="500">Plagiarism</text>
    <text x="12" y="36" font-family="system-ui" font-size="14" fill="#10b981" font-weight="800">0%</text>
    <text x="40" y="36" font-family="system-ui" font-size="7" fill="#10b981">✓ Original</text>
  </g>
  <!-- Content type badges bottom -->
  <g filter="url(#sh)" transform="translate(275, 256)">
    <rect width="48" height="22" rx="6" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
    <text x="8" y="15" font-family="system-ui" font-size="7" fill="#92400e" font-weight="600">Blog</text>
  </g>
  <g filter="url(#sh)" transform="translate(330, 256)">
    <rect width="48" height="22" rx="6" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
    <text x="8" y="15" font-family="system-ui" font-size="7" fill="#92400e" font-weight="600">Copy</text>
  </g>
</svg>
