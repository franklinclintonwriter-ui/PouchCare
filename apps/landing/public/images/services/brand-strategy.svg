<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ede9fe"/><stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <circle cx="45" cy="50" r="4" fill="#8b5cf6" opacity=".2"/>
  <circle cx="365" cy="255" r="5" fill="#7c3aed" opacity=".15"/>
  <!-- Logo mark -->
  <g filter="url(#sh)">
    <circle cx="200" cy="120" r="55" fill="white"/>
    <circle cx="200" cy="120" r="40" fill="#8b5cf6" opacity=".1"/>
    <circle cx="200" cy="120" r="25" fill="#8b5cf6" opacity=".2"/>
    <text x="200" y="128" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="bold" fill="#7c3aed">P</text>
  </g>
  <!-- Color palette -->
  <g filter="url(#sh)">
    <rect x="80" y="200" width="240" height="40" rx="20" fill="white"/>
    <circle cx="120" cy="220" r="14" fill="#7c3aed"/>
    <circle cx="155" cy="220" r="14" fill="#a78bfa"/>
    <circle cx="190" cy="220" r="14" fill="#c4b5fd"/>
    <circle cx="225" cy="220" r="14" fill="#1e293b"/>
    <circle cx="260" cy="220" r="14" fill="#64748b"/>
    <circle cx="295" cy="220" r="14" fill="#f8fafc"/>
    <circle cx="295" cy="220" r="13" stroke="#e5e7eb" stroke-width="1" fill="#f8fafc"/>
  </g>
  <!-- Typography card -->
  <g filter="url(#sh)">
    <rect x="30" y="55" width="95" height="55" rx="10" fill="white"/>
    <text x="45" y="73" font-family="system-ui" font-size="7" fill="#9ca3af">Typography</text>
    <text x="45" y="90" font-family="serif" font-size="14" font-weight="bold" fill="#374151">Aa Bb</text>
    <text x="45" y="102" font-family="system-ui" font-size="7" fill="#a78bfa">Sora + Inter</text>
  </g>
  <!-- Brand book card -->
  <g filter="url(#sh)">
    <rect x="285" y="50" width="85" height="50" rx="10" fill="white"/>
    <text x="300" y="70" font-family="system-ui" font-size="7" fill="#9ca3af">Guidelines</text>
    <rect x="300" y="78" width="55" height="12" rx="4" fill="#8b5cf6"/>
    <text x="327" y="87" text-anchor="middle" font-family="system-ui" font-size="7" font-weight="bold" fill="white">PDF ↓</text>
  </g>
</svg>
