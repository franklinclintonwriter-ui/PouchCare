<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0fdf4"/><stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#10b981"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Shield/Lock -->
  <g filter="url(#sh)" transform="translate(30, 25)">
    <path d="M70 0 L130 20 L130 80 Q130 130 70 150 Q10 130 10 80 L10 20 Z" fill="url(#shield)" opacity=".95"/>
    <path d="M70 10 L120 27 L120 78 Q120 120 70 138 Q20 120 20 78 L20 27 Z" fill="white" opacity=".1"/>
    <!-- Padlock on shield -->
    <rect x="52" y="55" width="36" height="28" rx="5" fill="white"/>
    <rect x="56" y="42" width="28" height="20" rx="14" fill="none" stroke="white" stroke-width="4"/>
    <circle cx="70" cy="67" r="4" fill="#059669"/>
    <rect x="68" y="68" width="4" height="8" rx="1" fill="#059669"/>
    <!-- SSL badge -->
    <rect x="42" y="95" width="56" height="20" rx="8" fill="white" opacity=".9"/>
    <text x="70" y="109" font-family="system-ui" font-size="10" fill="#059669" font-weight="800" text-anchor="middle">SSL</text>
  </g>
  <!-- Certificate card -->
  <g filter="url(#sh)" transform="translate(175, 15)">
    <rect width="200" height="105" rx="10" fill="white"/>
    <!-- Certificate header -->
    <rect width="200" height="28" rx="10" fill="#059669"/>
    <rect y="18" width="200" height="10" fill="#059669"/>
    <text x="12" y="18" font-family="system-ui" font-size="8" fill="white" font-weight="700">🔒 SSL Certificate</text>
    <text x="130" y="18" font-family="system-ui" font-size="7" fill="#a7f3d0" font-weight="600">ACTIVE</text>
    <!-- Cert details -->
    <text x="12" y="44" font-family="system-ui" font-size="7" fill="#64748b">Issued to:</text>
    <text x="70" y="44" font-family="monospace" font-size="7" fill="#1e293b" font-weight="600">*.pouchcare.com</text>
    <text x="12" y="58" font-family="system-ui" font-size="7" fill="#64748b">Issuer:</text>
    <text x="70" y="58" font-family="monospace" font-size="7" fill="#1e293b" font-weight="600">Let's Encrypt R3</text>
    <text x="12" y="72" font-family="system-ui" font-size="7" fill="#64748b">Expires:</text>
    <text x="70" y="72" font-family="monospace" font-size="7" fill="#1e293b" font-weight="600">2027-03-15</text>
    <text x="12" y="86" font-family="system-ui" font-size="7" fill="#64748b">Type:</text>
    <rect x="70" y="78" width="60" height="14" rx="4" fill="#ecfdf5"/>
    <text x="76" y="89" font-family="system-ui" font-size="7" fill="#059669" font-weight="600">Wildcard OV</text>
    <text x="12" y="100" font-family="system-ui" font-size="7" fill="#64748b">Encryption:</text>
    <text x="70" y="100" font-family="monospace" font-size="7" fill="#1e293b" font-weight="600">TLS 1.3 / AES-256</text>
  </g>
  <!-- DNS Records table -->
  <g filter="url(#sh)" transform="translate(175, 130)">
    <rect width="200" height="115" rx="10" fill="white"/>
    <text x="12" y="20" font-family="system-ui" font-size="8" fill="#1e293b" font-weight="700">DNS Records</text>
    <!-- Table header -->
    <rect x="8" y="28" width="184" height="16" rx="4" fill="#f0fdf4"/>
    <text x="14" y="39" font-family="system-ui" font-size="6" fill="#64748b" font-weight="700">TYPE</text>
    <text x="48" y="39" font-family="system-ui" font-size="6" fill="#64748b" font-weight="700">NAME</text>
    <text x="100" y="39" font-family="system-ui" font-size="6" fill="#64748b" font-weight="700">VALUE</text>
    <text x="168" y="39" font-family="system-ui" font-size="6" fill="#64748b" font-weight="700">TTL</text>
    <!-- A record -->
    <rect x="14" y="49" width="12" height="10" rx="3" fill="#3b82f6"/>
    <text x="17" y="56" font-family="monospace" font-size="5" fill="white" font-weight="700">A</text>
    <text x="48" y="57" font-family="monospace" font-size="6" fill="#374151">@</text>
    <text x="100" y="57" font-family="monospace" font-size="6" fill="#374151">104.21.x.x</text>
    <text x="168" y="57" font-family="monospace" font-size="6" fill="#94a3b8">Auto</text>
    <!-- CNAME record -->
    <rect x="14" y="63" width="24" height="10" rx="3" fill="#8b5cf6"/>
    <text x="16" y="70" font-family="monospace" font-size="5" fill="white" font-weight="700">CNAME</text>
    <text x="48" y="71" font-family="monospace" font-size="6" fill="#374151">www</text>
    <text x="100" y="71" font-family="monospace" font-size="6" fill="#374151">pouchcare.com</text>
    <text x="168" y="71" font-family="monospace" font-size="6" fill="#94a3b8">Auto</text>
    <!-- MX record -->
    <rect x="14" y="77" width="14" height="10" rx="3" fill="#f59e0b"/>
    <text x="16" y="84" font-family="monospace" font-size="5" fill="white" font-weight="700">MX</text>
    <text x="48" y="85" font-family="monospace" font-size="6" fill="#374151">@</text>
    <text x="100" y="85" font-family="monospace" font-size="6" fill="#374151">mail.pouch...</text>
    <text x="168" y="85" font-family="monospace" font-size="6" fill="#94a3b8">3600</text>
    <!-- TXT record -->
    <rect x="14" y="91" width="14" height="10" rx="3" fill="#10b981"/>
    <text x="16" y="98" font-family="monospace" font-size="5" fill="white" font-weight="700">TXT</text>
    <text x="48" y="99" font-family="monospace" font-size="6" fill="#374151">@</text>
    <text x="100" y="99" font-family="monospace" font-size="6" fill="#374151">v=spf1 incl...</text>
    <text x="168" y="99" font-family="monospace" font-size="6" fill="#94a3b8">3600</text>
  </g>
  <!-- Bottom feature badges -->
  <g filter="url(#sh)" transform="translate(30, 200)">
    <rect width="125" height="36" rx="8" fill="white"/>
    <text x="12" y="16" font-family="system-ui" font-size="7" fill="#059669" font-weight="700">🔄 Auto-Renewal</text>
    <text x="12" y="30" font-family="system-ui" font-size="6" fill="#64748b">SSL certs renew automatically</text>
  </g>
  <g filter="url(#sh)" transform="translate(30, 244)">
    <rect width="125" height="36" rx="8" fill="white"/>
    <text x="12" y="16" font-family="system-ui" font-size="7" fill="#059669" font-weight="700">🌐 Managed DNS</text>
    <text x="12" y="30" font-family="system-ui" font-size="6" fill="#64748b">Full DNS zone editor included</text>
  </g>
  <!-- HTTPS Bar -->
  <g transform="translate(175, 254)">
    <rect width="200" height="30" rx="8" fill="#059669" filter="url(#sh)"/>
    <rect x="8" y="8" width="14" height="14" rx="4" fill="rgba(255,255,255,.2)"/>
    <text x="12" y="19" font-family="system-ui" font-size="8" fill="white">🔒</text>
    <text x="30" y="19" font-family="monospace" font-size="8" fill="white" font-weight="600">https://pouchcare.com</text>
    <rect x="156" y="8" width="36" height="14" rx="4" fill="rgba(255,255,255,.2)"/>
    <text x="162" y="19" font-family="system-ui" font-size="7" fill="white" font-weight="600">Secure</text>
  </g>
</svg>
