<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0f2fe"/><stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <circle cx="40" cy="50" r="4" fill="#3b82f6" opacity=".2"/>
  <circle cx="370" cy="260" r="5" fill="#2563eb" opacity=".15"/>
  <!-- Dashboard -->
  <g filter="url(#sh)">
    <rect x="50" y="40" width="300" height="220" rx="12" fill="white"/>
    <!-- Header -->
    <rect x="50" y="40" width="300" height="35" rx="12" fill="#f8fafc"/>
    <rect x="50" y="65" width="300" height="10" fill="#f8fafc"/>
    <text x="70" y="63" font-family="system-ui" font-size="10" font-weight="bold" fill="#374151">Analytics Dashboard</text>
    <circle cx="330" cy="57" r="8" fill="#3b82f6" opacity=".15"/>
    <!-- Big number -->
    <text x="75" y="105" font-family="system-ui" font-size="24" font-weight="bold" fill="#1e293b">24,891</text>
    <text x="75" y="118" font-family="system-ui" font-size="8" fill="#9ca3af">Total visitors this month</text>
    <text x="200" y="105" font-family="system-ui" font-size="10" font-weight="bold" fill="#10b981">↑ 23.4%</text>
    <!-- Line chart -->
    <polyline points="75,180 110,165 145,170 180,150 215,155 250,135 285,120 320,125" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="75,180 110,165 145,170 180,150 215,155 250,135 285,120 320,125 320,200 75,200" fill="#3b82f6" opacity=".06"/>
    <!-- Axis labels -->
    <text x="75" y="215" font-family="system-ui" font-size="6" fill="#9ca3af">Mon</text>
    <text x="135" y="215" font-family="system-ui" font-size="6" fill="#9ca3af">Wed</text>
    <text x="195" y="215" font-family="system-ui" font-size="6" fill="#9ca3af">Fri</text>
    <text x="260" y="215" font-family="system-ui" font-size="6" fill="#9ca3af">Sun</text>
    <!-- Metric cards row -->
    <rect x="75" y="225" width="70" height="25" rx="6" fill="#f0fdf4"/>
    <text x="85" y="238" font-family="system-ui" font-size="6" fill="#16a34a">Bounce 32%</text>
    <rect x="155" y="225" width="70" height="25" rx="6" fill="#eff6ff"/>
    <text x="165" y="238" font-family="system-ui" font-size="6" fill="#2563eb">Conv 4.2%</text>
    <rect x="235" y="225" width="70" height="25" rx="6" fill="#fef3c7"/>
    <text x="245" y="238" font-family="system-ui" font-size="6" fill="#d97706">Avg 2:34</text>
  </g>
</svg>
