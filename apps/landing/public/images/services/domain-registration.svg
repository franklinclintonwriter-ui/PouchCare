<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5f3ff"/><stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Globe illustration -->
  <g filter="url(#sh)" transform="translate(40, 30)">
    <circle cx="80" cy="80" r="72" fill="white"/>
    <circle cx="80" cy="80" r="66" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <!-- Globe lines -->
    <ellipse cx="80" cy="80" rx="28" ry="66" stroke="#8b5cf6" stroke-width="1.2" fill="none" opacity=".3"/>
    <ellipse cx="80" cy="80" rx="50" ry="66" stroke="#8b5cf6" stroke-width="1" fill="none" opacity=".2"/>
    <line x1="14" y1="80" x2="146" y2="80" stroke="#8b5cf6" stroke-width="1" opacity=".2"/>
    <line x1="80" y1="14" x2="80" y2="146" stroke="#8b5cf6" stroke-width="1" opacity=".2"/>
    <path d="M20 55 Q80 45 140 55" stroke="#8b5cf6" stroke-width="1" fill="none" opacity=".15"/>
    <path d="M20 105 Q80 115 140 105" stroke="#8b5cf6" stroke-width="1" fill="none" opacity=".15"/>
    <!-- TLD badges on globe -->
    <g>
      <rect x="50" y="45" width="36" height="16" rx="6" fill="#8b5cf6"/>
      <text x="56" y="56" font-family="system-ui" font-size="8" fill="white" font-weight="800">.com</text>
    </g>
    <g>
      <rect x="90" y="72" width="30" height="14" rx="5" fill="#a78bfa"/>
      <text x="95" y="82" font-family="system-ui" font-size="7" fill="white" font-weight="700">.net</text>
    </g>
    <g>
      <rect x="42" y="90" width="24" height="14" rx="5" fill="#7c3aed"/>
      <text x="47" y="100" font-family="system-ui" font-size="7" fill="white" font-weight="700">.io</text>
    </g>
    <g>
      <rect x="85" y="100" width="26" height="14" rx="5" fill="#6d28d9"/>
      <text x="90" y="110" font-family="system-ui" font-size="7" fill="white" font-weight="700">.dev</text>
    </g>
  </g>
  <!-- Search box -->
  <g filter="url(#sh)" transform="translate(40, 200)">
    <rect width="280" height="44" rx="12" fill="white"/>
    <text x="16" y="27" font-family="system-ui" font-size="10" fill="#a78bfa">🔍</text>
    <text x="36" y="28" font-family="system-ui" font-size="10" fill="#94a3b8">Search for your domain...</text>
    <rect x="220" y="8" width="52" height="28" rx="8" fill="#8b5cf6"/>
    <text x="230" y="26" font-family="system-ui" font-size="8" fill="white" font-weight="700">Search</text>
  </g>
  <!-- Domain results -->
  <g filter="url(#sh)" transform="translate(40, 254)">
    <rect width="130" height="30" rx="6" fill="white"/>
    <text x="10" y="13" font-family="monospace" font-size="7" fill="#1e293b" font-weight="700">mybrand.com</text>
    <text x="10" y="24" font-family="system-ui" font-size="7" fill="#10b981" font-weight="600">Available · $12.99/yr</text>
  </g>
  <g filter="url(#sh)" transform="translate(180, 254)">
    <rect width="130" height="30" rx="6" fill="white"/>
    <text x="10" y="13" font-family="monospace" font-size="7" fill="#1e293b" font-weight="700">mybrand.io</text>
    <text x="10" y="24" font-family="system-ui" font-size="7" fill="#10b981" font-weight="600">Available · $34.99/yr</text>
  </g>
  <!-- Right side features -->
  <g filter="url(#sh)" transform="translate(210, 35)">
    <rect width="170" height="60" rx="8" fill="white"/>
    <text x="12" y="20" font-family="system-ui" font-size="8" fill="#1e293b" font-weight="700">Why register with us?</text>
    <text x="12" y="36" font-family="system-ui" font-size="7" fill="#10b981">✓</text>
    <text x="24" y="36" font-family="system-ui" font-size="7" fill="#374151">Transparent renewal pricing</text>
    <text x="12" y="50" font-family="system-ui" font-size="7" fill="#10b981">✓</text>
    <text x="24" y="50" font-family="system-ui" font-size="7" fill="#374151">Free DNS management &amp; WHOIS</text>
  </g>
  <!-- Pricing card -->
  <g filter="url(#sh)" transform="translate(210, 110)">
    <rect width="170" height="75" rx="8" fill="white"/>
    <text x="12" y="20" font-family="system-ui" font-size="7" fill="#64748b" font-weight="600">Popular TLDs</text>
    <g transform="translate(12, 28)">
      <rect width="40" height="16" rx="4" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
      <text x="6" y="12" font-family="system-ui" font-size="7" fill="#7c3aed" font-weight="600">.com</text>
    </g>
    <text x="58" y="40" font-family="system-ui" font-size="7" fill="#374151">$12.99</text>
    <g transform="translate(12, 48)">
      <rect width="40" height="16" rx="4" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
      <text x="6" y="12" font-family="system-ui" font-size="7" fill="#7c3aed" font-weight="600">.net</text>
    </g>
    <text x="58" y="60" font-family="system-ui" font-size="7" fill="#374151">$11.99</text>
    <text x="100" y="40" font-family="system-ui" font-size="7" fill="#374151">.io $34.99</text>
    <text x="100" y="60" font-family="system-ui" font-size="7" fill="#374151">.dev $14.99</text>
  </g>
</svg>
