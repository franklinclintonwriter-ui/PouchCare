<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fef3c7"/><stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <circle cx="40" cy="260" r="4" fill="#f59e0b" opacity=".2"/>
  <circle cx="370" cy="40" r="5" fill="#d97706" opacity=".15"/>
  <!-- Envelope -->
  <g filter="url(#sh)">
    <path d="M80 90 L200 170 L320 90 L320 220 L80 220 Z" fill="white"/>
    <path d="M80 90 L200 170 L320 90" fill="#fbbf24" opacity=".3"/>
    <path d="M80 90 L200 170 L320 90" stroke="#f59e0b" stroke-width="2" fill="none"/>
    <rect x="80" y="90" width="240" height="130" rx="4" stroke="#e5e7eb" stroke-width="1" fill="none"/>
  </g>
  <!-- Email content preview -->
  <g filter="url(#sh)">
    <rect x="110" y="115" width="180" height="85" rx="6" fill="white"/>
    <rect x="125" y="125" width="60" height="6" rx="3" fill="#f59e0b" opacity=".6"/>
    <rect x="125" y="137" width="150" height="4" rx="2" fill="#d1d5db"/>
    <rect x="125" y="146" width="130" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="125" y="155" width="145" height="4" rx="2" fill="#e5e7eb"/>
    <!-- CTA button -->
    <rect x="125" y="170" width="70" height="20" rx="6" fill="#f59e0b"/>
    <text x="160" y="184" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="white">Shop Now</text>
  </g>
  <!-- Stats card -->
  <g filter="url(#sh)">
    <rect x="30" y="40" width="90" height="45" rx="10" fill="white"/>
    <text x="45" y="57" font-family="system-ui" font-size="7" fill="#9ca3af">Open rate</text>
    <text x="45" y="73" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">42.3%</text>
  </g>
  <!-- Chart card -->
  <g filter="url(#sh)">
    <rect x="290" y="150" width="85" height="55" rx="10" fill="white"/>
    <text x="305" y="168" font-family="system-ui" font-size="7" fill="#9ca3af">Conversions</text>
    <!-- Mini bar chart -->
    <rect x="305" y="185" width="8" height="12" rx="2" fill="#fde68a"/>
    <rect x="317" y="180" width="8" height="17" rx="2" fill="#fbbf24"/>
    <rect x="329" y="175" width="8" height="22" rx="2" fill="#f59e0b"/>
    <rect x="341" y="171" width="8" height="26" rx="2" fill="#d97706"/>
  </g>
</svg>
