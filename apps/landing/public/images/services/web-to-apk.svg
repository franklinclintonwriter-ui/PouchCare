<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <circle cx="45" cy="45" r="4" fill="#22c55e" opacity=".2"/>
  <circle cx="365" cy="260" r="5" fill="#16a34a" opacity=".15"/>
  <!-- Phone frame -->
  <g filter="url(#sh)">
    <rect x="120" y="25" width="160" height="250" rx="20" fill="#1e293b"/>
    <rect x="128" y="35" width="144" height="230" rx="14" fill="white"/>
    <!-- Status bar -->
    <rect x="165" y="30" width="70" height="5" rx="3" fill="#374151"/>
    <!-- App header -->
    <rect x="128" y="35" width="144" height="30" rx="14" fill="#22c55e"/>
    <rect x="128" y="55" width="144" height="10" fill="#22c55e"/>
    <text x="200" y="55" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="white">MyApp</text>
    <!-- Content -->
    <rect x="140" y="80" width="120" height="50" rx="8" fill="#f0fdf4"/>
    <rect x="150" y="90" width="50" height="6" rx="3" fill="#22c55e" opacity=".5"/>
    <rect x="150" y="102" width="100" height="4" rx="2" fill="#d1d5db"/>
    <rect x="150" y="112" width="80" height="4" rx="2" fill="#e5e7eb"/>
    <!-- List items -->
    <rect x="140" y="140" width="120" height="30" rx="6" fill="#f9fafb"/>
    <circle cx="155" cy="155" r="8" fill="#22c55e" opacity=".15"/>
    <rect x="170" y="150" width="60" height="4" rx="2" fill="#6b7280"/>
    <rect x="170" y="158" width="40" height="3" rx="1" fill="#d1d5db"/>
    <rect x="140" y="175" width="120" height="30" rx="6" fill="#f9fafb"/>
    <circle cx="155" cy="190" r="8" fill="#3b82f6" opacity=".15"/>
    <rect x="170" y="185" width="55" height="4" rx="2" fill="#6b7280"/>
    <rect x="170" y="193" width="45" height="3" rx="1" fill="#d1d5db"/>
    <!-- Bottom nav -->
    <rect x="140" y="218" width="120" height="35" rx="8" fill="#f8fafc"/>
    <circle cx="163" cy="236" r="6" fill="#22c55e" opacity=".4"/>
    <circle cx="188" cy="236" r="6" fill="#9ca3af" opacity=".3"/>
    <circle cx="213" cy="236" r="6" fill="#9ca3af" opacity=".3"/>
    <circle cx="238" cy="236" r="6" fill="#9ca3af" opacity=".3"/>
  </g>
  <!-- Arrow website to mobile -->
  <g filter="url(#sh)">
    <rect x="30" y="100" width="75" height="50" rx="8" fill="white"/>
    <text x="67" y="120" text-anchor="middle" font-family="system-ui" font-size="7" fill="#9ca3af">Website</text>
    <text x="67" y="138" text-anchor="middle" font-size="16">🌐</text>
  </g>
  <path d="M105 125 L118 125" stroke="#22c55e" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/></marker></defs>
  <!-- Play Store badge -->
  <g filter="url(#sh)">
    <rect x="295" y="105" width="80" height="40" rx="8" fill="white"/>
    <text x="335" y="122" text-anchor="middle" font-family="system-ui" font-size="6" fill="#9ca3af">Published on</text>
    <text x="335" y="137" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="#22c55e">▶ Play Store</text>
  </g>
</svg>
