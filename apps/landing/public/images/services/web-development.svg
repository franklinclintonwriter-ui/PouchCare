    <text x="168" y="180" font-family="monospace" font-size="8" fill="#cdd6f4">=</text>
    <text x="176" y="180" font-family="monospace" font-size="8" fill="#a6e3a1">"hero"</text>
    <text x="206" y="180" font-family="monospace" font-size="8" fill="#89b4fa">&gt;</text>
