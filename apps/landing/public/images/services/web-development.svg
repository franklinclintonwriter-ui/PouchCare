    <text x="195" y="148" font-family="monospace" font-size="8" fill="#fab387"> App</text>
    <text x="215" y="148" font-family="monospace" font-size="8" fill="#cdd6f4">() {</text>
    <text x="42" y="164" font-family="monospace" font-size="8" fill="#6c7086">5</text>
    <text x="68" y="164" font-family="monospace" font-size="8" fill="#cba6f7">  return</text>
    <text x="110" y="164" font-family="monospace" font-size="8" fill="#cdd6f4"> (</text>
