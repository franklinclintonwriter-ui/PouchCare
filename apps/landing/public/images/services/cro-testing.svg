<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ecfdf5"/><stop offset="1" stop-color="#d1fae5"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <circle cx="40" cy="40" r="4" fill="#10b981" opacity=".2"/>
  <circle cx="370" cy="265" r="5" fill="#059669" opacity=".15"/>
  <!-- Split screen A/B -->
  <g filter="url(#sh)">
    <!-- Version A -->
    <rect x="40" y="50" width="145" height="200" rx="10" fill="white"/>
    <rect x="40" y="50" width="145" height="30" rx="10" fill="#fef2f2"/>
    <rect x="40" y="70" width="145" height="10" fill="#fef2f2"/>
    <text x="112" y="70" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#dc2626">Version A</text>
    <rect x="55" y="95" width="115" height="45" rx="6" fill="#fee2e2"/>
    <rect x="65" y="105" width="50" height="5" rx="2" fill="#fca5a5"/>
    <rect x="65" y="115" width="80" height="4" rx="2" fill="#fecaca"/>
    <rect x="65" y="124" width="60" height="4" rx="2" fill="#fecaca"/>
    <rect x="55" y="155" width="70" height="22" rx="6" fill="#ef4444"/>
    <text x="90" y="170" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="white">Buy Now</text>
    <text x="112" y="210" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">Conv: 2.1%</text>
    <rect x="80" y="220" width="65" height="6" rx="3" fill="#fecaca"/>
    <rect x="80" y="220" width="14" height="6" rx="3" fill="#ef4444"/>
  </g>
  <g filter="url(#sh)">
    <!-- Version B -->
    <rect x="215" y="50" width="145" height="200" rx="10" fill="white"/>
    <rect x="215" y="50" width="145" height="30" rx="10" fill="#ecfdf5"/>
    <rect x="215" y="70" width="145" height="10" fill="#ecfdf5"/>
    <text x="287" y="70" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#059669">Version B</text>
    <rect x="230" y="95" width="115" height="45" rx="6" fill="#d1fae5"/>
    <rect x="240" y="105" width="50" height="5" rx="2" fill="#6ee7b7"/>
    <rect x="240" y="115" width="80" height="4" rx="2" fill="#a7f3d0"/>
    <rect x="240" y="124" width="60" height="4" rx="2" fill="#a7f3d0"/>
    <rect x="230" y="155" width="70" height="22" rx="6" fill="#10b981"/>
    <text x="265" y="170" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="white">Get Started</text>
    <text x="287" y="210" text-anchor="middle" font-family="system-ui" font-size="9" fill="#059669" font-weight="bold">Conv: 5.8%</text>
    <rect x="255" y="220" width="65" height="6" rx="3" fill="#a7f3d0"/>
    <rect x="255" y="220" width="38" height="6" rx="3" fill="#10b981"/>
  </g>
  <!-- Winner badge -->
  <g filter="url(#sh)">
    <rect x="270" y="260" width="65" height="22" rx="8" fill="#10b981"/>
    <text x="302" y="275" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="white">✓ Winner</text>
  </g>
  <!-- VS divider -->
  <circle cx="200" cy="150" r="16" fill="white" filter="url(#sh)"/>
  <text x="200" y="155" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#374151">VS</text>
</svg>
