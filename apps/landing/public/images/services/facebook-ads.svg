<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fdf2f8"/><stop offset="1" stop-color="#fce7f3"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".12"/></filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Facebook/Instagram feed post -->
  <g filter="url(#sh)">
    <rect x="40" y="20" width="220" height="260" rx="12" fill="white"/>
    <!-- Post header -->
    <circle cx="62" cy="44" r="14" fill="#ec4899" opacity=".2"/>
    <text x="62" y="48" text-anchor="middle" font-family="system-ui" font-size="10">🏢</text>
    <text x="84" y="42" font-family="system-ui" font-size="8" fill="#1e293b" font-weight="700">Your Brand</text>
    <rect x="84" y="46" width="40" height="10" rx="4" fill="#dbeafe"/>
    <text x="88" y="54" font-family="system-ui" font-size="6" fill="#3b82f6" font-weight="600">Sponsored</text>
    <!-- Post image area -->
    <rect x="40" y="66" width="220" height="120" fill="#fce7f3"/>
    <rect x="54" y="80" width="140" height="14" rx="4" fill="white" opacity=".9"/>
    <text x="64" y="91" font-family="system-ui" font-size="9" fill="#1e293b" font-weight="800">🔥 Summer Sale 50% Off</text>
    <text x="54" y="120" font-family="system-ui" font-size="8" fill="#374151">Shop the collection everyone</text>
    <text x="54" y="134" font-family="system-ui" font-size="8" fill="#374151">is talking about. Limited time.</text>
    <rect x="54" y="148" width="80" height="24" rx="8" fill="#ec4899"/>
    <text x="68" y="164" font-family="system-ui" font-size="9" fill="white" font-weight="700">Shop Now</text>
    <!-- Engagement bar -->
    <g transform="translate(48, 192)">
      <text font-family="system-ui" font-size="9" fill="#ec4899">❤️</text>
      <text x="14" font-family="system-ui" font-size="7" fill="#64748b">2.4K</text>
      <text x="48" font-family="system-ui" font-size="9" fill="#64748b">💬</text>
      <text x="60" font-family="system-ui" font-size="7" fill="#64748b">342</text>
      <text x="96" font-family="system-ui" font-size="9" fill="#64748b">↗️</text>
      <text x="108" font-family="system-ui" font-size="7" fill="#64748b">89</text>
    </g>
    <!-- Post text -->
    <text x="48" y="224" font-family="system-ui" font-size="7" fill="#374151">🎯 Reaching 45,000 people in your target</text>
    <text x="48" y="236" font-family="system-ui" font-size="7" fill="#374151">audience. Tap to learn more about our...</text>
    <text x="48" y="248" font-family="system-ui" font-size="7" fill="#3b82f6">See more</text>
    <!-- Action bar -->
    <rect x="40" y="258" width="220" height="22" fill="#f8fafc" rx="0"/>
    <text x="80" y="273" font-family="system-ui" font-size="7" fill="#64748b" font-weight="500">👍 Like</text>
    <text x="130" y="273" font-family="system-ui" font-size="7" fill="#64748b" font-weight="500">💬 Comment</text>
    <text x="192" y="273" font-family="system-ui" font-size="7" fill="#64748b" font-weight="500">↗ Share</text>
  </g>
  <!-- Audience targeting card -->
  <g filter="url(#sh)" transform="translate(275, 20)">
    <rect width="105" height="90" rx="8" fill="white"/>
    <text x="10" y="18" font-family="system-ui" font-size="7" fill="#64748b" font-weight="600">Audience</text>
    <circle cx="24" cy="36" r="8" fill="#fce7f3"/>
    <text x="24" y="40" text-anchor="middle" font-family="system-ui" font-size="8">👩</text>
    <circle cx="42" cy="36" r="8" fill="#dbeafe"/>
    <text x="42" y="40" text-anchor="middle" font-family="system-ui" font-size="8">👨</text>
    <circle cx="60" cy="36" r="8" fill="#dcfce7"/>
    <text x="60" y="40" text-anchor="middle" font-family="system-ui" font-size="8">🧑</text>
    <text x="10" y="60" font-family="system-ui" font-size="7" fill="#374151">Age: 25-45</text>
    <text x="10" y="72" font-family="system-ui" font-size="7" fill="#374151">Interest: Shopping</text>
    <text x="10" y="84" font-family="system-ui" font-size="7" fill="#ec4899" font-weight="600">458K reach</text>
  </g>
  <!-- Performance card -->
  <g filter="url(#sh)" transform="translate(275, 125)">
    <rect width="105" height="65" rx="8" fill="white"/>
    <text x="10" y="18" font-family="system-ui" font-size="7" fill="#64748b" font-weight="600">Ad Spend</text>
    <text x="10" y="40" font-family="system-ui" font-size="18" fill="#1e293b" font-weight="900">$2.4K</text>
    <text x="10" y="56" font-family="system-ui" font-size="8" fill="#10b981" font-weight="700">ROAS: 6.8x ↑</text>
  </g>
  <!-- Platform badges -->
  <g filter="url(#sh)" transform="translate(275, 205)">
    <rect width="105" height="75" rx="8" fill="white"/>
    <text x="10" y="18" font-family="system-ui" font-size="7" fill="#64748b" font-weight="600">Platforms</text>
    <rect x="10" y="26" width="85" height="18" rx="5" fill="#dbeafe"/>
    <text x="18" y="39" font-family="system-ui" font-size="8" fill="#1877f2" font-weight="700">📘 Facebook</text>
    <rect x="10" y="48" width="85" height="18" rx="5" fill="#fce7f3"/>
    <text x="18" y="61" font-family="system-ui" font-size="8" fill="#e4405f" font-weight="700">📷 Instagram</text>
  </g>
</svg>
