/* ── helpers ── */
function useCounter(end,dur=1400){
  const[v,set]=useState(0),ref=useRef();
  useEffect(()=>{
    const o=new IntersectionObserver(([e])=>{
      if(!e.isIntersecting)return;o.disconnect();
      let s=null;
      const step=ts=>{if(!s)s=ts;const p=Math.min((ts-s)/dur,1);set(Math.floor(p*end));if(p<1)requestAnimationFrame(step);else set(end);};
      requestAnimationFrame(step);
    },{threshold:.3});
    if(ref.current)o.observe(ref.current);
    return()=>o.disconnect();
  },[end]);
  return[v,ref];
}

function formatUsd(value){
  const n = typeof value === 'number' ? value : Number(value);
  if(!Number.isFinite(n)) return '—';
  return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:2}).format(n);
}

/* ── APP ── */
function App(){
  const[page,setPage]=useState('home');
  const[open,setOpen]=useState(false);
  const[refCode,setRefCode]=useState('');
  const[pkgs,setPkgs]=useState(PKGS_FALLBACK);
  const go=useCallback((p)=>{setPage(p);setOpen(false);window.scrollTo({top:0,behavior:'smooth'});},[]);
  useEffect(()=>{const u=new URLSearchParams(window.location.search);const r=u.get('ref');if(r){setRefCode(r);setPage('register');}},[]);
  useEffect(()=>{
    fetch(`${API_BASE}/backlink-packages?limit=200`)
      .then((r)=>r.json())
      .then((json)=>{
        const rows = Array.isArray(json?.data) ? json.data : Array.isArray(json?.data?.data) ? json.data.data : [];
        setPkgs(mapApiPkgs(rows));
      })
      .catch(()=>{});
  },[]);
  const pages={home:<Home go={go} pkgs={pkgs}/>,services:<Services go={go}/>,backlinks:<Backlinks go={go} pkgs={pkgs}/>,pricing:<Pricing go={go}/>,about:<About go={go}/>,contact:<Contact go={go}/>,login:<Login go={go}/>,register:<Register go={go} refCode={refCode}/>};
  return(
    <>
      <style>{S}</style>
      <Navbar page={page} go={go} open={open} setOpen={setOpen}/>
      <main>{pages[page]||pages.home}</main>
      {!['login','register'].includes(page)&&<Footer go={go}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
